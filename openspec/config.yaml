schema: spec-driven

context: |
  Tech stack: Astro 5.16.15, Tailwind CSS 4.1.18, TypeScript 5.9.3 (strict), Node.js ESM
  Architecture: Container-Presentational, sections/ui/layout separation, config/data-driven content
  Testing: Node.js native node:test (5 suites, ~28 tests), integration via build-HTML asserts
  Style: Tailwind utility-first, technical/minimalist aesthetic, bilingual ES/EN locale-aware config

rules:
  proposal:
    - Include rollback plan for risky changes
    - Document impact on bilingual ES/EN content
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Preserve sections/ui/layout/config/data separation
    - No new client JS without explicit justification
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Validate build and typecheck after each phase
  apply:
    - Follow existing code patterns
    - Never modify ASTRO config, Tailwind tokens, or BaseLayout structure without justification
    - Prefer content/config changes over structural changes
    tdd: true
    test_command: "npm run test:ci"
  verify:
    test_command: "npm run test:ci"
    build_command: "npm run build"
    typecheck_command: "npm run typecheck"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
    - Preserve existing spec sections unless explicitly REMOVED

testing:
  strict_tdd: true
  runner: node:test
  command: "npm run test:ci"
  test_pattern: "tests/*.test.mjs"
  coverage_available: false
